services:
  justgui_frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        PUBLIC_APP_ENV: ${PUBLIC_APP_ENV:-local}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:8010}
        PUBLIC_LINKEDIN_URL: ${PUBLIC_LINKEDIN_URL:-https://www.linkedin.com/in/justgui}
        PUBLIC_GITHUB_URL: ${PUBLIC_GITHUB_URL:-https://github.com/justgu1}
        PUBLIC_INSTAGRAM_URL: ${PUBLIC_INSTAGRAM_URL:-https://www.instagram.com/just.guis}
        PUBLIC_GA4_MEASUREMENT_ID: ${PUBLIC_GA4_MEASUREMENT_ID:-}
        PUBLIC_META_PIXEL_ID: ${PUBLIC_META_PIXEL_ID:-}
        PUBLIC_CV_URL: ${PUBLIC_CV_URL:-/cv/GuilhermeSantos-Curriculo-2026.pdf}
        PUBLIC_WHATSAPP_NUMBER: ${PUBLIC_WHATSAPP_NUMBER:-5511976598853}
    image: justgui_frontend:latest
    container_name: justgui_frontend
    restart: unless-stopped
    expose:
      - "${FRONTEND_PORT:-4321}"
    working_dir: /var/www/frontend
    volumes:
      - ./:/var/www
      - justgui_data:/var/www/data
    env_file:
      - ./.env
    environment:
      PUBLIC_APP_ENV: ${PUBLIC_APP_ENV:-local}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:8010}
      PUBLIC_LINKEDIN_URL: ${PUBLIC_LINKEDIN_URL:-https://www.linkedin.com/in/justgui}
      PUBLIC_GITHUB_URL: ${PUBLIC_GITHUB_URL:-https://github.com/justgu1}
      PUBLIC_INSTAGRAM_URL: ${PUBLIC_INSTAGRAM_URL:-https://www.instagram.com/just.guis}
      PUBLIC_GA4_MEASUREMENT_ID: ${PUBLIC_GA4_MEASUREMENT_ID:-}
      PUBLIC_META_PIXEL_ID: ${PUBLIC_META_PIXEL_ID:-}
      PUBLIC_CV_URL: ${PUBLIC_CV_URL:-/cv/GuilhermeSantos-Curriculo-2026.pdf}
      PUBLIC_WHATSAPP_NUMBER: ${PUBLIC_WHATSAPP_NUMBER:-5511976598853}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-justgui}
      CONTACT_TO: ${CONTACT_TO:-}
      DATABASE_PATH: ${DATABASE_PATH:-/var/www/data/justgui.sqlite}
      VISITOR_IP_SALT: ${VISITOR_IP_SALT:-}
    networks:
      - justgui
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:4321 || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  justgui_nginx:
    image: nginx:stable-alpine3.21
    container_name: justgui_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8010}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - justgui
    depends_on:
      - justgui_frontend

networks:
  justgui:
    driver: bridge

volumes:
  justgui_data:
