services:
  justgui_api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: justgui_api:latest
    container_name: justgui_api
    restart: unless-stopped
    expose:
      - "${API_PORT:-8080}"
    working_dir: /var/www/api
    volumes:
      - ./:/var/www
    env_file:
      - ./.env
    networks:
      - justgui
    depends_on:
      justgui_db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/health || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  justgui_frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        PUBLIC_APP_ENV: ${PUBLIC_APP_ENV:-local}
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:4321}
        PUBLIC_LINKEDIN_URL: ${PUBLIC_LINKEDIN_URL:-https://www.linkedin.com/in/justgui}
        PUBLIC_GITHUB_URL: ${PUBLIC_GITHUB_URL:-https://github.com/justgu1}
        PUBLIC_INSTAGRAM_URL: ${PUBLIC_INSTAGRAM_URL:-https://www.instagram.com/just.guis}
        PUBLIC_GA4_MEASUREMENT_ID: ${PUBLIC_GA4_MEASUREMENT_ID:-}
        PUBLIC_META_PIXEL_ID: ${PUBLIC_META_PIXEL_ID:-}
        PUBLIC_CV_URL: ${PUBLIC_CV_URL:-}
    image: justgui_frontend:latest
    container_name: justgui_frontend
    restart: unless-stopped
    expose:
      - "${FRONTEND_PORT:-4321}"
    working_dir: /var/www/frontend
    volumes:
      - ./:/var/www
    env_file:
      - ./.env
    networks:
      - justgui
    depends_on:
      justgui_api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:4321 || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  justgui_db:
    image: postgres:18
    container_name: justgui_db
    restart: unless-stopped
  
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_PORT: ${DB_PORT}
    expose:
      - "${DB_PORT}"
    volumes:
      - justgui_db_data:/var/lib/postgresql
    networks:
      - justgui
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  justgui_nginx:
    image: nginx:stable-alpine3.21
    container_name: justgui_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8010}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - justgui
    depends_on:
      - justgui_api
      - justgui_frontend
      - justgui_db

volumes:
  justgui_db_data:

networks:
  justgui:
    driver: bridge