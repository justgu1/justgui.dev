name: Build & Push Docker Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: justgu1/justgui-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PUBLIC_APP_ENV=production
            PUBLIC_SITE_URL=https://justgui.dev
            PUBLIC_LINKEDIN_URL=${{ vars.PUBLIC_LINKEDIN_URL || 'https://www.linkedin.com/in/justgui' }}
            PUBLIC_GITHUB_URL=${{ vars.PUBLIC_GITHUB_URL || 'https://github.com/justgu1' }}
            PUBLIC_INSTAGRAM_URL=${{ vars.PUBLIC_INSTAGRAM_URL || 'https://www.instagram.com/just.guis' }}
            PUBLIC_GA4_MEASUREMENT_ID=${{ secrets.PUBLIC_GA4_MEASUREMENT_ID }}
            PUBLIC_META_PIXEL_ID=${{ secrets.PUBLIC_META_PIXEL_ID }}
            PUBLIC_CV_URL=${{ vars.PUBLIC_CV_URL || '/cv/GuilhermeSantos-Curriculo-2026.pdf' }}
            PUBLIC_WHATSAPP_NUMBER=${{ vars.PUBLIC_WHATSAPP_NUMBER || '5511976598853' }}
          cache-from: type=gha,scope=justgui-web
          cache-to: type=gha,mode=max,scope=justgui-web

      - name: Update image tag in infra repo
        env:
          INFRA_SWARM_TOKEN: ${{ secrets.INFRA_SWARM_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          TOKEN="${INFRA_SWARM_TOKEN:-$GH_PAT}"
          if [ -z "${TOKEN:-}" ]; then
            echo "::notice::Sem token para infra — imagem no GHCR ok; justgu1/infra-swarm não foi atualizado. Guarda INFRA_SWARM_TOKEN ou GH_PAT nos secrets do repositório."
            exit 0
          fi
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          git clone https://x-access-token:${TOKEN}@github.com/justgu1/infra-swarm.git /tmp/infra
          cd /tmp/infra
          git config user.email "ci@justgui.dev"
          git config user.name "GitHub Actions"
          sed -i "s|JUSTGUI_TAG=.*|JUSTGUI_TAG=${SHA_TAG}|" .env.example || true
          git diff --quiet && echo "No changes" && exit 0
          git add .env.example
          git commit -m "chore(justgui): update image tag to ${SHA_TAG} [ci skip]"
          git push
